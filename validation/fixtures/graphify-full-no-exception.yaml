apiVersion: ai-dev-governance/v1
governanceVersion: v0.6.0
profile: strict-baseline
adapters:
  - providers/claude
  - tooling/rtk
evidence:
  planningPath: docs/planning
  validationPath: docs/validation
  releasePath: docs/releases
exceptions:
  registryPath: docs/governance/exceptions.yaml
  reviewCadenceDays: 14
approval:
  accountableRole: tech-lead
  requiredReviewers: 2
automation:
  mode: risk-tiered
  stateMachine: [ingest, plan, artifact-generation, implementation, validation, board-review, gate, release]
  tiers:
    low: {autoMerge: true, requiredHumanApprovals: 0, boardReviewRequired: false}
    medium: {autoMerge: false, requiredHumanApprovals: 1, boardReviewRequired: false}
    high: {autoMerge: false, requiredHumanApprovals: 2, boardReviewRequired: true}
    critical: {autoMerge: false, requiredHumanApprovals: 2, boardReviewRequired: true}
  boardTriggerRules: {highRequiresBoard: true, criticalRequiresBoard: true}
  humanInterventionRules: {chairApprovalForHighCritical: true, exceptionApprovalRequired: true, compositionApprovalRequired: true}
boardReview:
  enabled: true
  packetTemplatePath: templates/BOARD_REVIEW_PACKET_TEMPLATE.md
  meetingTemplatePath: templates/BOARD_REVIEW_MEETING_TEMPLATE.md
  opportunityTemplatePath: templates/BOARD_OPPORTUNITY_REGISTER_TEMPLATE.md
  criticalFindingsBlockRelease: true
  selection:
    requiredLenses: [architecture, reliability, security, performance, operability, cognitive-load, agentic-AI-systems]
    minimumWeightedScore: 4.0
    minimumRoleFitScore: 4.0
    minimumEvidenceAccessibilityScore: 4.0
    refreshCadence: quarterly
    incidentTriggeredRefresh: true
  composition:
    rosterPath: docs/planning/board/board-composition-approval-2026-04-19.md
    approvalRecordPath: docs/planning/board/board-composition-approval-2026-04-19.md
    minimumAlternatesPerSeat: 1
graphify:
  collectionStrategy: split
  securityMode: full
  allowlist:
    - "src/**"
  sourceRepoTag: ai-dev-governance
  promotionThreshold: "p90"
  promotionFloor: 3
  promotionCeiling: 100
  autoTune: false
  pinnedNodes: []
  inferredEdgeThreshold: null
  crossRepoAuthority: []
  annotateApprovalStatus: false
