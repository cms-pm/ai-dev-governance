apiVersion: ai-dev-governance/v1
governanceVersion: v0.5.2
profile: strict-baseline+embedded
adapters:
  - providers/codex
  - tooling/rtk
  - profiles/embedded
evidence:
  planningPath: docs/planning
  validationPath: docs/validation
  releasePath: docs/releases
exceptions:
  registryPath: docs/governance/exceptions.yaml
  reviewCadenceDays: 14
approval:
  accountableRole: tech-lead
  requiredReviewers: 2
automation:
  mode: risk-tiered
  stateMachine:
    - ingest
    - plan
    - artifact-generation
    - implementation
    - validation
    - board-review
    - gate
    - release
  tiers:
    low:
      autoMerge: true
      requiredHumanApprovals: 0
      boardReviewRequired: false
    medium:
      autoMerge: false
      requiredHumanApprovals: 1
      boardReviewRequired: false
    high:
      autoMerge: false
      requiredHumanApprovals: 2
      boardReviewRequired: true
    critical:
      autoMerge: false
      requiredHumanApprovals: 2
      boardReviewRequired: true
  boardTriggerRules:
    highRequiresBoard: true
    criticalRequiresBoard: true
  humanInterventionRules:
    chairApprovalForHighCritical: true
    exceptionApprovalRequired: true
    compositionApprovalRequired: true
boardReview:
  enabled: true
  packetTemplatePath: .governance/ai-dev-governance/templates/BOARD_REVIEW_PACKET_TEMPLATE.md
  meetingTemplatePath: .governance/ai-dev-governance/templates/BOARD_REVIEW_MEETING_TEMPLATE.md
  opportunityTemplatePath: .governance/ai-dev-governance/templates/BOARD_OPPORTUNITY_REGISTER_TEMPLATE.md
  sprintCritiqueCadenceDays: 7
  accountabilityCadenceDays: 28
  incidentReviewSlaHours: 24
  criticalFindingsBlockRelease: true
  selection:
    requiredLenses:
      - architecture
      - reliability
      - security
      - performance
      - operability
      - cognitive-load
      - domain-specific
    minimumWeightedScore: 4.0
    minimumRoleFitScore: 4.0
    minimumEvidenceAccessibilityScore: 4.0
    refreshCadence: quarterly
    incidentTriggeredRefresh: true
  composition:
    rosterPath: docs/governance/board/board-composition.yaml
    approvalRecordPath: docs/governance/board/board-composition-approval.md
    minimumAlternatesPerSeat: 1
updateCadence: monthly
compatibility: strict
# Graphify block (v0.6.0+). Drives scripts/run_graphify.sh.
# NOTE: `allowlist` grammar is fnmatch-style (`*`, `**`, `?`). Brace
# alternations like `**/*.{c,h}` are NOT expanded and will be rejected by
# the validator. Write out each extension explicitly.
graphify:
  collectionStrategy: split
  securityMode: restricted
  sourceRepoTag: example-product
  allowlist:
    - "src/**/*.py"
    - "src/**/*.md"
    - "lib/**/*.c"
    - "lib/**/*.cc"
    - "lib/**/*.cpp"
    - "lib/**/*.h"
    - "lib/**/*.hpp"
    - "docs/**/*.md"
